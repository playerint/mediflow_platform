<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CRM 관리 — ippeo Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/crm_mgmt.css">
</head>
<body>
<div id="sidebar-mount" data-active="crm"></div>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <a class="topbar-back" href="../index.html">← 대시보드</a>
      <span class="topbar-sep">/</span>
      <span class="topbar-title">CRM 관리</span>
    </div>
    <div class="topbar-right">
      <select style="font-size:12px;padding:6px 10px;border-radius:var(--r);border:1px solid var(--gray-200);background:#fff;color:var(--gray-700)">
        <option>2026년 5월</option><option>2026년 4월</option>
      </select>
      <button class="btn" onclick="exportCrmCsv()">📥 CSV</button>
    </div>
  </div>
  <div class="content">
    <div class="kpi-grid" id="crm-kpi"></div>
    <div class="grid2">
      <div class="card">
        <div class="card-head"><div class="card-title">병원별 문의 현황</div></div>
        <div id="crm-hospital-list"></div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title">채널별 분포</div></div>
        <div style="position:relative;width:100%;height:200px">
          <canvas id="channelChart" role="img" aria-label="채널별 문의 분포">채널별 문의.</canvas>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title">전체 미확인 문의</div><span style="font-size:12px;color:var(--gray-400)">5건 · 즉시 처리 필요</span></div>
      <table class="table">
        <thead><tr><th>병원</th><th>환자명</th><th>채널</th><th>내용</th><th>경과</th><th>상태</th><th></th></tr></thead>
        <tbody id="crm-tbody"></tbody>
      </table>
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/crm_mgmt.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>병원 상세 — ippeo Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
<style>
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--gray-200);margin-bottom:20px;}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--gray-400);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab:hover{color:var(--gray-700);}
.tab.on{color:var(--teal-d);border-bottom-color:var(--teal);font-weight:600;}
.tab-panel{display:none;}
.tab-panel.on{display:block;animation:fadeUp .2s ease both;}

.hosp-hero{background:#fff;border:1px solid var(--gray-200);border-radius:var(--rl);padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:20px;}
.hosp-avatar{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--teal) 0%,var(--teal-d) 100%);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.hosp-meta{flex:1;}
.hosp-name{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.hosp-sub{font-size:12px;color:var(--gray-400);display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

.info-row{display:flex;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--gray-100);}
.info-row:last-child{border-bottom:none;}
.info-label{width:120px;font-size:12px;font-weight:600;color:var(--gray-400);text-transform:uppercase;letter-spacing:.04em;padding-top:2px;flex-shrink:0;}
.info-val{font-size:13px;color:var(--gray-700);flex:1;}

.step-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--gray-100);}
.step-item:last-child{border-bottom:none;}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px;}
.step-dot.done{background:var(--green-l);color:#065F46;}
.step-dot.current{background:var(--teal);color:#fff;box-shadow:0 0 0 4px var(--teal-l);}
.step-dot.wait{background:var(--gray-100);color:var(--gray-400);}

.metric-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--gray-100);}
.metric-row:last-child{border-bottom:none;}
</style>
</head>
<body>
<div id="sidebar-mount" data-active="hospitals"></div>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <a class="topbar-back" href="../index.html">← 대시보드</a>
      <span class="topbar-sep">/</span>
      <a class="topbar-back" href="hospital_list.html">병원 목록</a>
      <span class="topbar-sep">/</span>
      <span class="topbar-title" id="tb-name">병원 상세</span>
    </div>
    <div class="topbar-right" id="tb-actions"></div>
  </div>

  <div class="content fade">
    <!-- 헤더 -->
    <div class="hosp-hero" id="hosp-hero"></div>

    <!-- 탭 -->
    <div class="tab-bar">
      <div class="tab on"  onclick="switchTab('overview',this)">📋 개요</div>
      <div class="tab"     onclick="switchTab('onboarding',this)">🚀 온보딩</div>
      <div class="tab"     onclick="switchTab('site',this)">🌐 사이트</div>
      <div class="tab"     onclick="switchTab('crm',this)">💬 문의·CRM</div>
      <div class="tab"     onclick="switchTab('contract',this)">📄 계약·결제</div>
      <div class="tab"     onclick="switchTab('memo',this)">📝 내부 메모</div>
    </div>

    <!-- ── 개요 ── -->
    <div class="tab-panel on" id="tab-overview">
      <div class="grid2">
        <div class="card">
          <div class="card-head">
            <div class="card-title">🏥 병원 기본 정보</div>
            <button class="btn" style="font-size:12px;padding:4px 10px" onclick="editHospitalInfo()">편집</button>
          </div>
          <div id="basic-info"></div>
        </div>
        <div>
          <div class="card" style="margin-bottom:14px">
            <div class="card-head"><div class="card-title">📊 이번 달 성과</div></div>
            <div id="perf-metrics"></div>
          </div>
          <div class="card">
            <div class="card-head"><div class="card-title">⚡ 빠른 작업</div></div>
            <div style="display:flex;flex-direction:column;gap:6px" id="quick-actions"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── 온보딩 ── -->
    <div class="tab-panel" id="tab-onboarding">
      <div class="grid2">
        <div class="card">
          <div class="card-head">
            <div class="card-title">🚀 온보딩 진행 현황</div>
            <span id="ob-badge"></span>
          </div>
          <div id="ob-steps"></div>
          <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;gap:8px" id="ob-buttons"></div>
        </div>
        <div class="card">
          <div class="card-head"><div class="card-title">📁 업로드된 자산</div></div>
          <div id="ob-assets"></div>
        </div>
      </div>
    </div>

    <!-- ── 사이트 ── -->
    <div class="tab-panel" id="tab-site">
      <div class="grid2">
        <div class="card">
          <div class="card-head">
            <div class="card-title">🌐 사이트 현황</div>
            <button class="btn btn-primary" style="font-size:12px;padding:4px 10px" onclick="location.href='site_management.html'">관리 →</button>
          </div>
          <div id="site-info"></div>
        </div>
        <div class="card">
          <div class="card-head"><div class="card-title">⚠ 컴플라이언스 알림</div></div>
          <div id="compliance-list"></div>
        </div>
      </div>
      <div class="card" style="margin-top:14px">
        <div class="card-head"><div class="card-title">📈 Core Web Vitals</div></div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px" id="cwv-metrics"></div>
      </div>
    </div>

    <!-- ── CRM ── -->
    <div class="tab-panel" id="tab-crm">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px" id="crm-kpi"></div>
      <div class="card">
        <div class="card-head"><div class="card-title">💬 최근 문의 내역</div></div>
        <table class="table">
          <thead><tr><th>환자명</th><th>채널</th><th>내용</th><th>접수</th><th>상태</th><th></th></tr></thead>
          <tbody id="crm-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- ── 계약·결제 ── -->
    <div class="tab-panel" id="tab-contract">
      <div class="grid2">
        <div class="card">
          <div class="card-head">
            <div class="card-title">📄 계약 정보</div>
            <button class="btn" style="font-size:12px;padding:4px 10px" id="contract-edit-btn" onclick="openContractEdit()">수정</button>
          </div>
          <div id="contract-info"></div>
        </div>
        <div class="card">
          <div class="card-head"><div class="card-title">💳 결제 이력</div></div>
          <div id="billing-history"></div>
        </div>
      </div>
    </div>

    <!-- ── 내부 메모 ── -->
    <div class="tab-panel" id="tab-memo">
      <div class="grid2">
        <div>
          <div class="card">
            <div class="card-head"><div class="card-title">📝 담당자 메모</div></div>
            <div id="memo-list"></div>
            <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-100)">
              <textarea id="new-memo" rows="3" placeholder="새 메모를 입력하세요..." style="width:100%;font-size:13px;padding:10px 12px;border:1px solid var(--gray-200);border-radius:var(--r);resize:vertical;line-height:1.6;outline:none;font-family:inherit"></textarea>
              <div style="display:flex;justify-content:flex-end;margin-top:6px">
                <button class="btn btn-primary" style="font-size:12px" onclick="addMemo()">메모 저장</button>
              </div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-head"><div class="card-title">📋 활동 로그</div></div>
          <div id="activity-log"></div>
        </div>
      </div>
    </div>
  </div><!-- /content -->
</main>

<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script>

];

// URL에서 병원 id 파싱
// sessionStorage 신규 등록 병원 병합
(function() {
  try {
    const added = JSON.parse(sessionStorage.getItem('ippeo_new_hospitals') || '[]');
    added.forEach(h => { if (!HOSPITALS.find(x => x.id === h.id)) HOSPITALS.push(h); });
  } catch(e) {}
})();

const params  = new URLSearchParams(location.search);
// id가 타임스탬프(신규 등록)일 수 있어 parseInt 대신 그대로 파싱
const _rawId  = params.get('id');
const hospId  = _rawId ? (Number(_rawId)) : 1;
const H = HOSPITALS.find(h => h.id === hospId) || HOSPITALS.find(h => h.id === 1);

// ── 탭 전환 ──
function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tab-' + name).classList.add('on');
}

// ── 헤더 렌더 ──
function renderHero() {
  document.getElementById('tb-name').textContent = H.name;
  const planCls = {Pro:'badge-blue',Enterprise:'badge-purple',Basic:'badge-gray'}[H.plan];
  const stCls   = H.status === 'active' ? 'badge-green' : 'badge-amber';
  const stLb    = H.status === 'active' ? '운영 중' : '온보딩';

  document.getElementById('hosp-hero').innerHTML = `
    <div class="hosp-avatar">🏥</div>
    <div class="hosp-meta">
      <div class="hosp-name">
        ${H.name}
        <span class="badge ${stCls}">${stLb}</span>
        <span class="badge ${planCls}">${H.plan}</span>
      </div>
      <div class="hosp-sub">
        <span>${H.nameJa}</span>
        <span>·</span>
        <span>${H.specialty}</span>
        <span>·</span>
        <span style="font-family:monospace;color:var(--teal)">${H.url}</span>
        <span>·</span>
        <span>담당: ${H.manager}</span>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <a class="btn" href="onboarding_detail.html?id=${H.id}">🚀 온보딩</a>
      <button class="btn btn-primary" onclick="openSite()">🌐 사이트 열기</button>
    </div>`;

  document.getElementById('tb-actions').innerHTML = `
    <button class="btn btn-danger" id="pause-btn" onclick="togglePause()">${H.status === 'paused' ? '▶ 재개' : '⏸ 일시정지'}</button>
    <button class="btn" onclick="location.href='settings.html'">⚙ 설정</button>`;
}

// ── 개요 탭 ──
function renderOverview() {
  const planPrices = {Basic:390000, Pro:890000, Enterprise:1490000};
  document.getElementById('basic-info').innerHTML = [
    ['병원명 (KR)', H.name],
    ['병원명 (JP)', H.nameJa],
    ['전문 분야', H.specialty],
    ['전화번호', H.phone],
    ['주소', H.address],
    ['담당 매니저', H.manager],
    ['입점일', H.startDate],
    ['계약 플랜', `<span class="badge ${{Pro:'badge-blue',Enterprise:'badge-purple',Basic:'badge-gray'}[H.plan]}">${H.plan} · ₩${planPrices[H.plan].toLocaleString()}/월</span>`],
    ['계약 만료', (H.expire && H.expire !== '-') ? `<span style="${new Date(H.expire) < new Date(Date.now()+30*86400000) ? 'color:var(--red);font-weight:600' : ''}">${H.expire}</span>` : (H.status === 'onboarding' ? '온보딩 중 (계약 후 자동 설정)' : '-')],
  ].map(([l,v])=>`<div class="info-row"><div class="info-label">${l}</div><div class="info-val">${v}</div></div>`).join('');

  document.getElementById('perf-metrics').innerHTML = [
    ['방문자', H.visitors.toLocaleString()+'명', 'blue'],
    ['이번 달 문의', H.inq+'건', 'teal'],
    ['전환율', H.conv+'%', H.conv > 30 ? 'green' : 'amber'],
    ['AEO 인용', H.aeo+'회', 'purple'],
    ['LINE 해결률', H.lineRate+'%', H.lineRate > 85 ? 'green' : 'amber'],
    ['이번 달 매출', '₩'+H.revenue.toLocaleString(), 'green'],
  ].map(([l,v,c])=>`<div class="metric-row">
    <span style="font-size:13px;color:var(--gray-600)">${l}</span>
    <span style="font-size:14px;font-weight:700;color:var(--${c})">${v}</span>
  </div>`).join('');

  document.getElementById('quick-actions').innerHTML = [
    {lb:'🚀 온보딩 이어서 진행', href:`onboarding_detail.html?id=${H.id}`, cls:''},
    {lb:'💬 문의·CRM 보기', href:'crm_management.html', cls:''},
    {lb:'📊 리포트 생성', href:'reports.html', cls:'btn-navy'},
    {lb:'📄 계약서 다운로드', href:'#', cls:'', click:"printContract()"},
  ].map(a=>`<a class="btn ${a.cls}" href="${a.href}" ${a.click?`onclick="${a.click}"`:''}>${a.lb}</a>`).join('');
}

// ── 온보딩 탭 ──
function renderOnboarding() {
  const step = H.obStep; // 현재까지 완료된 단계 (1~5)
  const isDone = H.status === 'active';
  const pct = Math.round(step / 5 * 100);

  document.getElementById('ob-badge').innerHTML = isDone
    ? '<span class="badge badge-green">완료</span>'
    : `<span class="badge badge-amber">진행 중 · ${step}/5</span>`;

  const stepsHtml = OB_STEPS.map((s, i) => {
    const n = i + 1;
    const cls = n < step ? 'done' : n === step ? 'current' : 'wait';
    const icon = n < step ? '✓' : n;

      <div style="flex:1">
        <div style="font-size:13px;font-weight:${n<=step?'600':'400'};color:${n<=step?'var(--navy)':'var(--gray-400)'}">${s.name}</div>

// ── 헬퍼: 토스트 ──
function showToast(msg, type) {
  const e = document.getElementById('__toast');
  if (e) e.remove();
  const bg = type === 'success' ? '#059669' : type === 'error' ? '#DC2626' : '#0F1E3C';
  const t = document.createElement('div');
  t.id = '__toast';
  t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:'+bg+';color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:9999;white-space:nowrap';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 2500);
}

// ── 컴플라이언스 처리 ──
function handleCompliance(btn) {
  if (!confirm('이 위반 항목을 처리 완료로 표시하시겠습니까?')) return;
  const item = btn.closest('div[style*="background:var(--red-l)"]') || btn.closest('div[style*="background:var(--amber-l)"]') || btn.parentElement;
  item.style.opacity = '0';
  item.style.transition = 'opacity .3s';
  setTimeout(() => {
    item.remove();
    H.compliance = Math.max(0, H.compliance - 1);
    const list = document.getElementById('compliance-list');
    if (list && !list.querySelector('button')) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--gray-400);font-size:13px">✓ 컴플라이언스 위반 없음</div>';
    }
  }, 300);
  showToast('위반 항목이 처리되었습니다.', 'success');
}

// ── CRM 인라인 답변 ──
function toggleReply(btn, name) {
  const tr = btn.closest('tr');
  const next = tr.nextElementSibling;
  if (next && next.classList.contains('reply-row')) {
    next.remove(); btn.textContent = '답변'; return;
  }
  const replyTr = document.createElement('tr');
  replyTr.className = 'reply-row';
  replyTr.innerHTML = `<td colspan="6" style="padding:8px 12px;background:var(--gray-50);border-bottom:1px solid var(--gray-100)">
    <div style="display:flex;gap:8px;align-items:flex-start">
      <textarea rows="2" placeholder="${name}에게 답변을 입력하세요..." style="flex:1;font-size:12px;padding:8px;border:1px solid var(--gray-200);border-radius:6px;resize:none;font-family:inherit;line-height:1.5;outline:none"></textarea>
      <div style="display:flex;flex-direction:column;gap:4px">
        <button class="btn btn-primary" style="font-size:12px;white-space:nowrap" onclick="sendReply(this,'${name}')">📤 발송</button>
        <button class="btn" style="font-size:12px" onclick="this.closest('.reply-row').remove()">취소</button>
      </div>
    </div>
  </td>`;
  tr.after(replyTr);
  btn.textContent = '닫기';
  replyTr.querySelector('textarea').focus();
}
function sendReply(btn, name) {
  const txt = btn.closest('td').querySelector('textarea').value.trim();
  if (!txt) { showToast('답변 내용을 입력하세요.', 'error'); return; }
  const replyRow = btn.closest('.reply-row');
  const prevTr = replyRow.previousElementSibling;
  if (prevTr) {
    const replyBtn = prevTr.querySelector('button');
    if (replyBtn) replyBtn.textContent = '답변';
    // 상태 배지 업데이트
    const badge = prevTr.querySelector('.badge-red');
    if (badge) { badge.textContent = '완료'; badge.className = 'badge badge-gray'; }
    const ambBadge = prevTr.querySelector('.badge-amber');
    if (ambBadge) { ambBadge.textContent = '완료'; ambBadge.className = 'badge badge-gray'; }
  }
  replyRow.remove();
  showToast(`${name}에게 답변이 발송되었습니다.`, 'success');
}

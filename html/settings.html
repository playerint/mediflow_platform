<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>설정 — MEDIFLOW Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
</head>
<body>
<div id="sidebar-mount" data-active="settings"></div>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <a class="topbar-back" href="../index.html">← 대시보드</a>
      <span class="topbar-sep">/</span>
      <span class="topbar-title">설정</span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-primary" onclick="saveSettings()">💾 저장</button>
    </div>
  </div>
  <div class="content">
    <div class="settings-layout">
      <div class="settings-nav">
        <div class="sn-item active" onclick="showSec('profile',this)"><span>👤</span> 내 프로필</div>
        <div class="sn-item" onclick="showSec('team',this)"><span>👥</span> 팀 계정 관리</div>
        <div class="sn-item" onclick="showSec('roles',this)"><span>🔐</span> 권한 설정</div>
        <div class="sn-item" onclick="showSec('notification',this)"><span>🔔</span> 알림 설정</div>
        <div class="sn-item" onclick="showSec('system',this)"><span>⚙</span> 시스템 설정</div>
      </div>
      <div id="sec-content"></div>
    </div>
  </div>
</main>
<style>
/* 기본: 좌측 세로 네비 + 우측 콘텐츠 */
.settings-layout {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.settings-nav {
  width: 200px;
  flex-shrink: 0;
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: var(--rl);
  overflow: hidden;
  position: sticky;
  top: 72px;
}
#sec-content {
  flex: 1;
  min-width: 0; /* 콘텐츠가 넓어도 부모 밖으로 안 밀림 */
}
.sn-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; font-size: 13px;
  color: var(--gray-500); cursor: pointer;
  border-bottom: 1px solid var(--gray-100);
  transition: background .1s; white-space: nowrap;
}
.sn-item:last-child { border-bottom: none; }
.sn-item:hover { background: var(--gray-50); color: var(--gray-700); }
.sn-item.active { background: var(--teal-l); color: var(--teal-d); font-weight: 500; }

/* 좁은 화면: 네비를 상단 가로 탭으로 전환 */
@media (max-width: 1024px) {
  .settings-layout {
    flex-direction: column;
  }
  .settings-nav {
    width: 100%;
    position: static;
    display: flex;
    overflow-x: auto;
  }
  .settings-nav::-webkit-scrollbar { display: none; }
  .sn-item {
    border-bottom: 2px solid transparent;
    border-right: 1px solid var(--gray-100);
    flex-shrink: 0;
    padding: 10px 16px;
  }
  .sn-item:last-child { border-right: none; }
  .sn-item.active {
    border-bottom: 2px solid var(--teal-d);
    background: var(--teal-l);
  }
}
</style>


<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/settings_ippeo.js"></script>
</body>
</html>

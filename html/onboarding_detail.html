<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>온보딩 진행 — MEDIFLOW Admin</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
<style>
/* ════════════════════════════════════════
   레이아웃
════════════════════════════════════════ */
.ob-layout { display:flex; height:calc(100vh - 56px); overflow:hidden; }

/* ════════════════════════════════════════
   좌측 스텝 네비
════════════════════════════════════════ */
.ob-nav {
  width:200px; flex-shrink:0;
  border-right:1px solid var(--s200);
  background:var(--s0);
  display:flex; flex-direction:column;
  overflow-y:auto;
}
.ob-nav-hd {
  padding:18px 16px 10px;
  font-size:9px; font-weight:700;
  color:var(--s400); text-transform:uppercase; letter-spacing:1px;
}
.ob-step {
  display:flex; align-items:center; gap:10px;
  padding:8px 16px;
  cursor:pointer; transition:background .1s;
  border-left:2px solid transparent;
  position:relative;
}
.ob-step:hover { background:var(--s50); }
.ob-step.active {
  background:var(--navy-l);
  border-left-color:var(--navy);
}
.ob-num {
  width:20px; height:20px; border-radius:50%;
  font-size:10px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:all .15s;
  border:1.5px solid var(--s300);
  background:var(--s0); color:var(--s400);
}
.ob-num.done   { background:var(--s200); border-color:var(--s300); color:var(--s500); font-size:9px; }
.ob-num.active { background:var(--navy); border-color:var(--navy); color:#fff; }
.ob-num.wait   { background:var(--s0); border-color:var(--s200); color:var(--s300); }
.ob-step-info { min-width:0; }
.ob-step-name {
  font-size:12px; font-weight:600;
  color:var(--s700); line-height:1.3;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.ob-step.active .ob-step-name { color:var(--navy); font-weight:700; }
.ob-step.done .ob-step-name   { color:var(--s400); font-weight:500; }
.ob-step-sub {
  font-size:10px; color:var(--s400); margin-top:1px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.ob-nav-foot {
  margin-top:auto; padding:16px;
  border-top:1px solid var(--s100);
}
.ob-nav-foot-lbl { font-size:9px; font-weight:600; color:var(--s400); text-transform:uppercase; letter-spacing:.6px; }
.ob-nav-foot-val { font-size:17px; font-weight:800; color:var(--s900); margin:4px 0 2px; letter-spacing:-.3px; }
.ob-nav-foot-sub { font-size:10px; color:var(--s400); line-height:1.55; }

/* ════════════════════════════════════════
   우측 콘텐츠
════════════════════════════════════════ */
.ob-content {
  flex:1; overflow-y:auto;
  padding:0;
  background:var(--s50);
}
.ob-inner {
  max-width:none;
  padding:28px 40px 56px;
}
.ob-tag   { font-size:10px; font-weight:700; color:var(--blue); letter-spacing:1px; text-transform:uppercase; margin-bottom:6px; }
.ob-title { font-size:20px; font-weight:800; color:var(--s900); margin-bottom:6px; line-height:1.3; letter-spacing:-.3px; }
.ob-desc  { font-size:13px; color:var(--s500); margin-bottom:20px; line-height:1.7; }
.ob-foot  {
  display:flex; align-items:center; justify-content:space-between;
  margin-top:28px; padding-top:16px;
  border-top:1px solid var(--s200);
}

/* ════════════════════════════════════════
   카드 / 박스
════════════════════════════════════════ */
.ob-card {
  background:var(--s0);
  border:1px solid var(--s200);
  border-radius:var(--rl);
  margin-bottom:14px;
}
.ob-card-head {
  padding:14px 18px 12px;
  border-bottom:1px solid var(--s100);
  font-size:12px; font-weight:700; color:var(--s900);
}
.ob-card-body { padding:16px 18px; }

.ob-box {
  background:var(--s0); border:1px solid var(--s200);
  border-radius:var(--rl); padding:14px 18px; margin-bottom:14px;
}
.ob-section-lbl {
  font-size:10px; font-weight:700; color:var(--s400);
  text-transform:uppercase; letter-spacing:.6px; margin-bottom:10px;
}

/* 키워드 칩 */
.ob-kw-chip {
  display:inline-block; font-size:12px; padding:3px 9px;
  border-radius:4px; background:var(--s100); color:var(--s700);
  margin:2px 3px 2px 0; font-weight:500; border:1px solid var(--s200);
}

/* ════════════════════════════════════════
   체크리스트
════════════════════════════════════════ */
.ob-check-item {
  display:flex; align-items:center; gap:8px;
  padding:4px 0; font-size:12px; color:var(--s700);
}
.ob-check-icon { color:var(--green); font-size:13px; font-weight:700; flex-shrink:0; }

/* ════════════════════════════════════════
   스탯 그리드
════════════════════════════════════════ */
.ob-stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-top:16px; }
.ob-stat {
  text-align:center; padding:14px 8px;
  background:var(--s0); border:1px solid var(--s200); border-radius:var(--rl);
}
.ob-stat-val { font-size:22px; font-weight:800; color:var(--s900); margin-bottom:3px; letter-spacing:-.5px; line-height:1; }
.ob-stat-lbl { font-size:10px; color:var(--s500); }

/* ════════════════════════════════════════
   전략 그리드
════════════════════════════════════════ */
.ob-strategy-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.ob-strategy-box {
  background:var(--s50); border:1px solid var(--s200);
  border-radius:var(--r); padding:11px 13px;
}
.ob-strategy-box-title { font-size:12px; font-weight:600; color:var(--s900); margin-bottom:3px; }
.ob-strategy-box-desc  { font-size:12px; color:var(--s500); line-height:1.5; }

/* ════════════════════════════════════════
   템플릿 카드
════════════════════════════════════════ */
.tmpl-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px; }
.tmpl-card {
  border:1.5px solid var(--s200); border-radius:10px;
  overflow:hidden; cursor:pointer; transition:all .15s;
  position:relative; background:var(--s0);
}
.tmpl-card:hover { border-color:var(--s400); transform:translateY(-1px); }
.tmpl-card.selected { border-color:var(--navy); border-width:2px; }
.tmpl-preview { height:150px; display:flex; align-items:center; justify-content:center; }
.tmpl-check {
  position:absolute; top:7px; right:7px;
  width:20px; height:20px; border-radius:50%;
  background:var(--navy); color:#fff;
  font-size:10px; font-weight:800;
  display:flex; align-items:center; justify-content:center;
}
.tmpl-body { padding:11px 13px 12px; }
.tmpl-name { font-size:12px; font-weight:700; color:var(--s900); margin-bottom:2px; }
.tmpl-desc { font-size:10px; color:var(--s500); margin-bottom:7px; }
.tmpl-tag  {
  display:inline-block; font-size:9px; padding:1px 6px;
  border-radius:3px; background:var(--s100); color:var(--s500);
  margin:2px 2px 0 0;
}

/* 사진 업로드 CSS → asset-grid 로 대체됨 */

/* ════════════════════════════════════════
   카피 검수 테이블
════════════════════════════════════════ */
.copy-table { width:100%; border-collapse:collapse; margin-bottom:14px; }
.copy-table th {
  font-size:9px; font-weight:700; color:var(--s400);
  text-transform:uppercase; padding:8px 12px;
  border-bottom:1px solid var(--s200); text-align:left;
  white-space:nowrap; letter-spacing:.5px; background:var(--s50);
}
.copy-table td {
  font-size:12px; color:var(--s700);
  padding:9px 12px; border-bottom:1px solid var(--s100);
  vertical-align:top; line-height:1.5;
}
.copy-table tr:last-child td { border-bottom:none; }
.copy-table tr:hover td { background:var(--s50); }
.badge-ok  { background:var(--s100); color:var(--s700); font-size:10px; font-weight:600; padding:2px 7px; border-radius:4px; white-space:nowrap; display:inline-block; }
.badge-fix { background:var(--red-l); color:var(--red);  font-size:10px; font-weight:600; padding:2px 7px; border-radius:4px; white-space:nowrap; display:inline-block; }
.badge-ai  { background:var(--navy-l); color:var(--navy); font-size:10px; font-weight:600; padding:2px 7px; border-radius:4px; white-space:nowrap; display:inline-block; }

/* ════════════════════════════════════════
   통계 바 (Step5)
════════════════════════════════════════ */
.stat-bar { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:14px; }
.stat-bar-item { text-align:center; padding:12px; border-radius:var(--rl); border:1px solid var(--s200); background:var(--s0); }
.stat-bar-val { font-size:18px; font-weight:800; margin-bottom:2px; letter-spacing:-.3px; }
.stat-bar-lbl { font-size:10px; color:var(--s400); }

/* ════════════════════════════════════════
   광고법 체크
════════════════════════════════════════ */
.law-item { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--s100); }
.law-item:last-child { border-bottom:none; }
.law-chk { color:var(--green); font-size:13px; flex-shrink:0; }
.law-body { flex:1; }
.law-title { font-size:12px; font-weight:500; color:var(--s900); }
.law-ex    { font-size:10px; color:var(--s400); margin-top:1px; }
.law-badge { font-size:10px; font-weight:600; color:var(--s400); flex-shrink:0; }

/* ════════════════════════════════════════
   토글 스위치
════════════════════════════════════════ */
.toggle-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--s100); }
.toggle-row:last-child { border-bottom:none; }
.toggle-sw {
  width:34px; height:19px; border-radius:10px;
  flex-shrink:0; cursor:pointer;
  position:relative; transition:background .15s;
}
.toggle-sw.on  { background:var(--navy); }
.toggle-sw.off { background:var(--s300); }
.toggle-sw::after {
  content:''; position:absolute; top:2.5px;
  width:14px; height:14px; border-radius:50%;
  background:#fff; transition:left .15s;
  box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.toggle-sw.on::after  { left:17px; }
.toggle-sw.off::after { left:2.5px; }
.toggle-info { flex:1; min-width:0; }
.toggle-title { font-size:12px; font-weight:600; color:var(--s900); }
.toggle-sub   { font-size:10px; color:var(--s400); margin-top:1px; }
.toggle-state { font-size:10px; color:var(--s400); flex-shrink:0; }

/* ════════════════════════════════════════
   SEO 점수 카드
════════════════════════════════════════ */
.score-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px; }
.score-card { border-radius:var(--rl); padding:18px 20px; color:#fff; }
.score-num { font-size:38px; font-weight:800; line-height:1; letter-spacing:-1.5px; }
.score-unit { font-size:14px; font-weight:500; opacity:.6; }
.score-items { margin-top:12px; font-size:10px; opacity:.8; line-height:2; }

/* ════════════════════════════════════════
   도구 토글 리스트
════════════════════════════════════════ */
.tool-row { display:flex; align-items:center; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--s100); }
.tool-row:last-child { border-bottom:none; }
.tool-lbl { font-size:12px; color:var(--s700); }

/* ════════════════════════════════════════
   Step5 폰 미리보기
════════════════════════════════════════ */
.preview-wrap { display:grid; grid-template-columns:280px 1fr; gap:24px; margin-bottom:20px; align-items:start; }
.phone-frame  { background:var(--s900); border-radius:22px; padding:5px; }
.phone-screen { background:#fff; border-radius:17px; overflow:hidden; }
.phone-topbar { background:var(--navy); padding:9px 12px; display:flex; align-items:center; justify-content:space-between; }
.phone-hero   { background:linear-gradient(135deg,#FFF0F5,#FFE4EC); padding:18px 14px 14px; position:relative; overflow:hidden; }
.phone-menu   { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin:10px 12px 12px; }
.phone-menu-item { background:var(--s50); border-radius:5px; padding:7px 3px; text-align:center; font-size:9px; color:var(--s700); }

/* ════════════════════════════════════════
   게시 카드
════════════════════════════════════════ */
.publish-card { background:var(--s0); border:1px solid var(--s200); border-radius:var(--rl); padding:18px; }
.publish-check-item { display:flex; align-items:center; gap:7px; padding:4px 0; font-size:12px; color:var(--s700); }
.publish-check-icon { color:var(--green); font-size:12px; font-weight:700; flex-shrink:0; }

/* ════════════════════════════════════════
   스피너
════════════════════════════════════════ */
@keyframes ob-spin { to { transform:rotate(360deg); } }
.ob-spinner { display:inline-block; width:13px; height:13px; border:2px solid var(--navy); border-top-color:transparent; border-radius:50%; animation:ob-spin .7s linear infinite; flex-shrink:0; }

/* ════════════════════════════════════════
   자산 그리드 (Step 2)
════════════════════════════════════════ */
.asset-upload-zone { border:2px dashed var(--s300); border-radius:var(--rl); padding:24px; text-align:center; background:var(--s0); margin-bottom:20px; cursor:pointer; transition:all .2s; }
.asset-upload-zone:hover { border-color:var(--navy); background:var(--navy-l); }
.asset-cat { margin-bottom:24px; }
.asset-cat-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.asset-cat-title { font-size:14px; font-weight:600; color:var(--navy); display:flex; align-items:center; gap:8px; }
.asset-cat-count { font-size:12px; color:var(--s400); font-weight:400; }
.asset-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; }
.asset-card { background:var(--s0); border:1px solid var(--s200); border-radius:var(--r); overflow:hidden; position:relative; cursor:pointer; transition:all .2s; }
.asset-card:hover { border-color:var(--s400); transform:translateY(-1px); box-shadow:0 4px 12px rgba(0,0,0,.08); }
.asset-card.selected { border:2px solid var(--navy); box-shadow:0 0 0 3px rgba(15,30,62,.08); }
.asset-thumb { width:100%; height:100px; display:flex; align-items:center; justify-content:center; font-size:28px; background:var(--s100); }
.asset-meta { padding:8px 10px; }
.asset-name { font-size:12px; color:var(--s700); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.asset-sz { font-size:10px; color:var(--s400); }
.asset-actions { position:absolute; top:6px; right:6px; display:flex; gap:4px; opacity:0; transition:opacity .15s; }
.asset-card:hover .asset-actions { opacity:1; }
.asset-btn { width:24px; height:24px; border-radius:6px; background:rgba(0,0,0,.5); color:#fff; border:none; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; }
.asset-btn:hover { background:rgba(0,0,0,.7); }
.asset-badge-ba { position:absolute; top:6px; left:6px; font-size:9px; padding:2px 6px; border-radius:5px; font-weight:600; background:#EDE9FE; color:#4C1D95; }
.asset-add { background:var(--s0); border:1.5px dashed var(--s300); border-radius:var(--r); height:140px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:all .15s; gap:6px; color:var(--s400); font-size:12px; }
.asset-add:hover { border-color:var(--navy); color:var(--navy); }
</style>
</head>
<body>
<div id="sidebar-mount" data-active="onboarding"></div>
<main class="main">

  <!-- 탑바 -->
  <div class="topbar">
    <div class="topbar-left">
      <a class="topbar-back" href="onboarding_list.html">← 홈</a>
      <span class="topbar-sep">|</span>
      <div>
        <div style="font-size:14px;font-weight:700;color:var(--navy)" id="tb-name"></div>
        <div style="font-size:12px;color:var(--s400)" id="tb-sub"></div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn" onclick="autoSave()">임시 저장</button>
      <button class="btn" onclick="showPreviewModal()">미리보기</button>
      <button class="btn btn-navy" onclick="goToPublish()">게시하기</button>
    </div>
  </div>

  <div class="ob-layout">
    <!-- 좌측 스텝 리스트 -->
    <div class="ob-nav">
      <div class="ob-nav-hd">진행 단계</div>
      <div id="ob-nav-list"></div>
      <div class="ob-nav-foot">
        <div class="ob-nav-foot-lbl">예상 소요</div>
        <div class="ob-nav-foot-val">2~3시간</div>
        <div class="ob-nav-foot-sub">AI 자동 생성 5분<br>+ 운영자 검토 1시간</div>
      </div>
    </div>

    <!-- 우측 콘텐츠 -->
    <div class="ob-content" id="ob-content-wrap">
      <div class="ob-inner" id="ob-content"></div>
    </div>
  </div>
</main>

<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/config.js"></script>
<script src="../js/mock-data-platform.js"></script>
<script>
/* ── 데이터 ── */
var HOSPITALS = [
  {id:1,  name:'올래성형외과',   nameJa:'オーレ整形外科',  url:'jp.oleps.co.kr',   specialty:'종합 성형',    obStep:9},
  {id:10, name:'이수프리마',     nameJa:'イスプリマ',      url:'jp.isuprima.kr',   specialty:'눈·코 복합',   obStep:2},
  {id:11, name:'사당뷰성형외과', nameJa:'サダンビュー',    url:'jp.sadangview.kr', specialty:'안면윤곽·피부', obStep:5},
  {id:12, name:'방배탑성형외과', nameJa:'バンベタップ',    url:'jp.banbaetop.kr',  specialty:'쌍꺼풀 전문',  obStep:7},
];

var OB_STEPS = [
  {name:'자동 분석',   sub:'URL 크롤링 · 자산 추출'},
  {name:'전략 산출',   sub:'AI 기획안 · SEO 키워드'},
  {name:'디자인',      sub:'템플릿 선택'},
  {name:'자산',        sub:'사진 업로드'},
  {name:'카피 검수',   sub:'일본어 재집필 확인'},
  {name:'컴플라이언스',sub:'광고법 5종 검사'},
  {name:'퍼널 연결',   sub:'LINE·CRM·팔로잉'},
  {name:'SEO·AEO',     sub:'검색·AI 인용 최적화'},
  {name:'미리보기·게시',sub:'배포'},
];

/* ── Gemini ── */
var GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + (typeof GEMINI_API_KEY !== 'undefined' ? GEMINI_API_KEY : '');

// sessionStorage에 저장된 신규 등록 병원 병합
(function() {
  try {
    var added = JSON.parse(sessionStorage.getItem('MEDIFLOW_new_hospitals') || '[]');
    added.forEach(function(h) {
      if (!HOSPITALS.filter(function(x){ return x.id === h.id; }).length) HOSPITALS.push(h);
    });
  } catch(e) {}
})();

var p       = new URLSearchParams(location.search);
var hospId  = Number(p.get('id')) || 1;
var H       = HOSPITALS.filter(function(h){ return h.id === hospId; })[0] || HOSPITALS[0];
var curStep = H.obStep;
var viewStep= Math.min(curStep, 9);
var analyzed= curStep > 1;
var tmpl    = 1;
var siteUrl = '';        // 분석한 URL
var analysisResult = null;  // Gemini 분석 결과
var progItems = [];      // 진행 단계 상태 배열
var step5Lang = 'ja';   // 의역 언어 (기본: 일본어)

/* ── 병원별 사전 분석 결과 (Step 1 완료 병원용 mock) ── */
var HOSPITAL_MOCK_ANALYSIS = {
  10: { // 이수프리마 — 눈·코 복합

function renderNav() {
  document.getElementById('ob-nav-list').innerHTML = OB_STEPS.map(function(s, i) {
    var n   = i + 1;
    var state = n < curStep ? 'done' : n === viewStep ? 'active' : 'wait';
    return '<div class="ob-step' + (n === viewStep ? ' active' : '') + '" onclick="goStep(' + n + ')">'
      + '<div class="ob-num ' + state + '">' + (n < curStep ? '✓' : n) + '</div>'
      + '<div><div class="ob-step-name">' + s.name + '</div>'
      + '<div class="ob-step-sub">' + s.sub + '</div></div>'
      + '</div>';
  }).join('');
}

/* ── 이동 ── */
function goStep(n) {
  if (n > curStep + 1) return;
  viewStep = n;
  renderNav();
  document.getElementById('ob-content').innerHTML = STEPS[n]();
  document.getElementById('ob-content-wrap').scrollTop = 0;
}

function doneStep(n) {
  if (n >= curStep) curStep = Math.min(n + 1, 9);
  goStep(Math.min(n + 1, 9));
}

async function startAnalysis() {
  var urlEl = document.getElementById('url-inp');
  var url   = urlEl ? urlEl.value.trim() : '';
  if (!url) { showToast('URL을 입력해주세요.', 'error'); return; }
  if (!url.startsWith('http')) url = 'https://' + url;
  siteUrl = url;

  /* 진행 단계 초기화 — 4단계 파이프라인 */
  progItems = [
    // Phase 1: 수집
    {text:'한국 병원 홈페이지 크롤링',    state:'wait', phaseLabel:'1단계 · 수집'},
    {text:'텍스트·메뉴·헤딩 추출',        state:'wait'},
    {text:'B/A·의료진·시설 사진 분류',    state:'wait'},
    // Phase 2: 분류·매핑
    {text:'10개 섹션 구조 매핑',           state:'wait', phaseLabel:'2단계 · 분류·매핑'},
    {text:'수집 가능·불가 섹션 구분',      state:'wait'},
    // Phase 3: 1차 생성 (한국어)
    {text:'Hero · DECISION GUIDE 카피',   state:'wait', phaseLabel:'3단계 · 1차 생성 (한국어)'},
    {text:'의사 소개 · 시술 메뉴 작성',   state:'wait'},
    {text:'FAQ · 서비스 보장 · 기타',     state:'wait'},
    // Phase 4: 결과 확인
    {text:'이미지 가용성 최종 체크',       state:'wait', phaseLabel:'4단계 · 결과 확인'},
    {text:'일본 의료광고법 사전 스캔',     state:'wait'},
  ];

  /* 진행 화면 렌더 */
  var el = document.getElementById('ob-content');
  el.innerHTML = renderStep1Analyzing(url);

  function setItemState(i, state) {
    progItems[i].state = state;
    var list = document.getElementById('prog-list');
    if (list) list.innerHTML = progItems.map(renderProgItem).join('');
  }

  function delay(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

  /* ① Phase 1: 수집 — CORS 프록시로 HTML 크롤링 */
  var html = '';
  setItemState(0, 'running');
  try {
    var res  = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url));
    var json = await res.json();
    html = json.contents || '';
    setItemState(0, 'done');
  } catch(e) {
    setItemState(0, 'error');
  }

  /* Phase 1 계속: 텍스트 추출 */
  await delay(300);
  setItemState(1, 'running');
  var parsed = parseHospitalHtml(html);
  await delay(350);
  setItemState(1, 'done');

  /* Phase 1 계속: 이미지 분류 */
  await delay(300);
  setItemState(2, 'running');
  await delay(400);
  setItemState(2, 'done');

  /* ② Phase 2: 분류·매핑 */
  await delay(250);
  setItemState(3, 'running');
  await delay(400);
  setItemState(3, 'done');
  setItemState(4, 'running');
  await delay(300);
  setItemState(4, 'done');

  /* ③ Phase 3: 1차 생성(한국어) — Gemini 호출 */
  await delay(200);
  setItemState(5, 'running');
  try {
    analysisResult = await geminiAnalyze(url, parsed);
    setItemState(5, 'done');
    await delay(300);
    setItemState(6, 'running');
    await delay(350);
    setItemState(6, 'done');
    await delay(300);
    setItemState(7, 'running');
    await delay(350);
    setItemState(7, 'done');
  } catch(e) {
    /* Gemini 실패 시 파싱 결과 + 기본값으로 대체 */
    analysisResult = buildFallback(parsed);
    setItemState(5, 'error');
    setItemState(6, 'done');
    setItemState(7, 'done');
    showToast('AI 분석 실패 — 기본 데이터로 대체됩니다.', 'error');
  }

  /* ④ Phase 4: 결과 확인 */
  await delay(250);
  setItemState(8, 'running');
  await delay(350);
  setItemState(8, 'done');
  setItemState(9, 'running');
  await delay(300);
  setItemState(9, 'done');

  if (typeof analysisResult.recommendedTemplate === 'number') {
    tmpl = analysisResult.recommendedTemplate;
  }
  await delay(600);
  analyzed = true;
  curStep  = Math.max(curStep, 1);
  el.innerHTML = STEPS[1]();
}

/* ── HTML 파싱 ── */
function parseHospitalHtml(html) {
  if (!html) return {title:'', desc:'', headings:'', navItems:'', imgCount:0};
  try {
    var doc   = new DOMParser().parseFromString(html, 'text/html');
    var title = doc.querySelector('title') ? doc.querySelector('title').textContent.trim() : '';
    var metaEl= doc.querySelector('meta[name="description"]');
    var desc  = metaEl ? (metaEl.getAttribute('content') || '') : '';
    var heads = Array.from(doc.querySelectorAll('h1,h2,h3,h4'))
                  .map(function(h){ return h.textContent.trim(); })
                  .filter(Boolean).slice(0,30).join(' | ');
    var navs  = Array.from(doc.querySelectorAll('nav a,header a,.gnb a,.menu a,.lnb a'))
                  .map(function(a){ return a.textContent.trim(); })
                  .filter(Boolean).slice(0,20).join(', ');
    var imgs  = doc.querySelectorAll('img').length;
    return {title:title, desc:desc, headings:heads, navItems:navs, imgCount:imgs};
  } catch(e) {
    return {title:'', desc:'', headings:'', navItems:'', imgCount:0};
  }
}

/* ── Gemini 분석 ── */
function geminiAnalyze(url, parsed) {
  var snippet = ((parsed.headings || '') + ' ' + (parsed.navItems || '')).substring(0, 1000);
  var prompt  = '다음은 한국 성형외과 웹사이트 크롤링 결과입니다.\n'
    + 'URL: ' + url + '\n'
    + '제목: ' + (parsed.title || '(없음)') + '\n'
    + '설명: ' + (parsed.desc  || '(없음)') + '\n'
    + '메뉴/헤딩: ' + (snippet || '(없음)') + '\n\n'
    + '이 병원의 일본 시장 진출 분석을 JSON으로만 반환하세요 (코드블록 없이):\n'
    + '{"procedures":["시술1","시술2","시술3"],'
    + '"doctorCount":5,'
    + '"baPhotoCount":87,'
    + '"facilityPhotoCount":10,'
    + '"keywords":["日本語 키워드1","키워드2","키워드3"],'
    + '"positioning":"포지셔닝 진단 2~3문장",'
    + '"coreMessage":"핵심 일본어 카피",'
    + '"recommendedTemplate":0,'                           // 0=감성브랜드형 1=프리미엄형 2=컨버전형
    + '"heroCopy":"일본어 hero 카피 1~2문장",'             // 실제 사용 가능한 일본어 카피
    + '"complianceIssues":[],'                             // [{text:"위반표현",level:"block|gray"}]
    + '"strategies":[{"title":"전략1","desc":"설명"},{"title":"전략2","desc":"설명"},{"title":"전략3","desc":"설명"},{"title":"전략4","desc":"설명"}]}';

  return new Promise(function(resolve, reject) {
    fetch(GEMINI_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts:[{text:prompt}]}],
        generationConfig:{temperature:0.7, maxOutputTokens:2048}
      })
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      var parts = d.candidates && d.candidates[0] && d.candidates[0].content
        ? d.candidates[0].content.parts : [];
      var tp = parts.filter(function(p){ return !p.thought && p.text; })[0] || parts[0];
      var txt = tp ? tp.text.trim() : '';
      var clean = txt.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
      resolve(JSON.parse(clean));
    })
    .catch(reject);
  });
}

/* ── 의역 생성 (Gemini 배치 호출) ── */
async function generateTranslation() {
  if (typeof MOCK_TRANSLATION_ROWS === 'undefined') return;
  var langNames = {ja:'일본어', en:'영어', zh:'중국어(간체)'};
  var langHints = {ja:'日本語', en:'English', zh:'中文（简体）'};

  var btn = document.querySelector('[onclick="generateTranslation()"]');
  if (btn) { btn.disabled = true; btn.textContent = '의역 생성 중...'; }

  var koLines = MOCK_TRANSLATION_ROWS.map(function(r, i){
    return (i + 1) + '. [' + r.name + ']: ' + r.ko;
  }).join('\n');

  var prompt = '다음은 한국 성형외과 웹사이트 10개 섹션의 한국어 원문입니다.\n'
    + '각 항목을 ' + (langNames[step5Lang] || step5Lang) + '(' + (langHints[step5Lang] || '') + ')로 자연스럽게 의역하세요.\n'
    + '직역 금지. 현지 환자가 읽기에 자연스러운 표현을 사용하세요.\n'
    + '일본 의료광고법 준수: 효과 단정 표현·비교 광고·「최고/유일」 금지.\n'
    + '결과는 JSON 배열로만 반환하세요 (코드블록 없이): ["의역1","의역2",...,"의역10"]\n\n'
    + koLines;

  try {
    var res  = await fetch(GEMINI_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts:[{text:prompt}]}],
        generationConfig:{temperature:0.7, maxOutputTokens:2048}
      })
    });
    var data = await res.json();
    var parts = data.candidates && data.candidates[0] && data.candidates[0].content
      ? data.candidates[0].content.parts : [];
    var tp  = parts.filter(function(p){ return !p.thought && p.text; })[0] || parts[0];
    var txt = tp ? tp.text.trim() : '';
    var clean = txt.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
    var arr = JSON.parse(clean);
    arr.forEach(function(ja, i){
      if (MOCK_TRANSLATION_ROWS[i]) {
        MOCK_TRANSLATION_ROWS[i].ja = ja;
        MOCK_TRANSLATION_ROWS[i].ts = 'ai';
      }
    });
  } catch(e) {
    /* Gemini 실패 → 폴백 */
    if (typeof MOCK_TRANSLATION_FALLBACK_JA !== 'undefined') {
      MOCK_TRANSLATION_FALLBACK_JA.forEach(function(ja, i){
        if (MOCK_TRANSLATION_ROWS[i]) {
          MOCK_TRANSLATION_ROWS[i].ja = ja;
          MOCK_TRANSLATION_ROWS[i].ts = 'ai';
        }
      });
    }
    showToast('AI 의역 실패 — 샘플 의역으로 대체됩니다.', 'error');
  }
  document.getElementById('ob-content').innerHTML = STEPS[5]();
  document.getElementById('ob-content-wrap').scrollTop = 0;
}

/* ── 행 개별 검수 완료 ── */
function approveRow(idx) {
  if (typeof MOCK_TRANSLATION_ROWS !== 'undefined' && MOCK_TRANSLATION_ROWS[idx]) {
    MOCK_TRANSLATION_ROWS[idx].ts = 'done';
    document.getElementById('ob-content').innerHTML = STEPS[5]();
  }
}

/* ── 전체 AI 의역 → 검수 완료 일괄 처리 ── */
function markAllDone() {
  if (typeof MOCK_TRANSLATION_ROWS !== 'undefined') {
    MOCK_TRANSLATION_ROWS.forEach(function(r){ if (r.ts === 'ai') r.ts = 'done'; });
    document.getElementById('ob-content').innerHTML = STEPS[5]();
    showToast('전체 검수 완료 처리되었습니다.', 'success');
  }
}

  return phaseHd
    + '<div style="display:flex;align-items:center;gap:9px;padding:4px 0 4px 10px;font-size:12px;'
    + 'border-left:2px solid var(--s100);margin-left:5px;' + color + '">'

/* ── 파일 업로드 트리거 ── */
function triggerFileUpload(multiple) {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.multiple = !!multiple;
  input.onchange = function() {
    if (this.files && this.files.length) {
      showToast('✓ ' + this.files.length + '개 파일 업로드 완료', 'success');
    }
  };
  input.click();
}

/* ── 링크 공유 (클립보드) ── */
function shareBriefUrl() {
  var url = location.href;
  function fallback() {
    var el = document.createElement('textarea');
    el.value = url; el.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(el); el.select();
    try { document.execCommand('copy'); showToast('링크가 복사되었습니다.', 'success'); } catch(e) { showToast('복사에 실패했습니다.', 'error'); }
    document.body.removeChild(el);
  }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(function(){ showToast('링크가 클립보드에 복사되었습니다.', 'success'); }).catch(fallback);
  } else { fallback(); }
}

/* ── 카피 수정 (contenteditable 토글) ── */
function toggleCopyEdit(btn) {
  var tbody = document.getElementById('copy-tbody');
  if (!tbody) return;
  var cells = tbody.querySelectorAll('tr td:nth-child(3)');
  var isEditing = cells.length && cells[0].contentEditable === 'true';
  cells.forEach(function(cell) {
    cell.contentEditable = isEditing ? 'false' : 'true';
    cell.style.background = isEditing ? '' : '#FFFDE7';
    cell.style.outline = isEditing ? '' : '1.5px solid #F59E0B';
    cell.style.borderRadius = isEditing ? '' : '4px';
  });
  btn.textContent = isEditing ? '✏ 카피 수정' : '✓ 수정 완료';
  if (isEditing) showToast('카피 수정 내용이 저장되었습니다.', 'success');
}

function publishSite() {
  openOBModal('🚀 사이트 게시', H.name + ' 사이트를 게시하시겠습니까?', function() {

    setTimeout(function(){ location.href = 'hospital_detail.html?id=' + H.id; }, 1800);
  }, '게시', false);
}

function openOBModal(title, body, onConfirm, confirmLabel, isDanger) {
  var e = document.getElementById('__ob-modal'); if(e) e.remove();
  var m = document.createElement('div'); m.id = '__ob-modal';
  m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9500;display:flex;align-items:center;justify-content:center';
  var btnBg = isDanger ? 'background:#DC2626;color:#fff' : 'background:#0F1E3C;color:#fff';
  m.innerHTML = '<div style="background:#fff;border-radius:16px;padding:28px 32px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2)">'
    + '<div style="font-size:15px;font-weight:700;color:#0F1E3C;margin-bottom:10px">' + title + '</div>'
    + '<div style="font-size:13px;color:#374151;line-height:1.7;margin-bottom:20px">' + body + '</div>'
    + '<div style="display:flex;gap:8px;justify-content:flex-end">'
    + '<button onclick="document.getElementById(\'__ob-modal\').remove()" style="padding:8px 16px;border-radius:8px;border:1px solid #E5E7EB;background:#fff;font-size:13px;font-family:inherit;cursor:pointer">취소</button>'
    + '<button id="__ob-ok" style="padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;' + btnBg + '">' + (confirmLabel||'확인') + '</button>'
    + '</div></div>';
  m.addEventListener('click', function(e){ if(e.target===m) m.remove(); });
  document.body.appendChild(m);
  document.getElementById('__ob-ok').addEventListener('click', function(){ m.remove(); if(typeof onConfirm==='function') onConfirm(); });
}

function showToast(msg, type) {
  var e = document.getElementById('__toast');
  if (e) e.remove();
  var bg = type === 'success' ? '#059669' : type === 'error' ? '#DC2626' : '#0F1E3C';
  var t  = document.createElement('div');
  t.id   = '__toast';
  t.style.cssText = 'position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:' + bg + ';color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:9999;white-space:nowrap';
  t.textContent   = msg;
  document.body.appendChild(t);
  setTimeout(function(){
    t.style.opacity = '0'; t.style.transition = 'opacity .3s';
    setTimeout(function(){ t.remove(); }, 300);
  }, 2500);
}

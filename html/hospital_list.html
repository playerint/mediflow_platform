<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>병원 목록 — MEDIFLOW Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/hospitals.css">
</head>
<body>
<div id="sidebar-mount" data-active="hospitals"></div>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <a class="topbar-back" href="../index.html">← 대시보드</a>
      <span class="topbar-sep">/</span>
      <span class="topbar-title">병원 목록</span>
    </div>
    <div class="topbar-right">
      <input type="search" id="search" placeholder="병원명 검색..." style="width:200px;padding:6px 12px;border-radius:var(--r);border:1px solid var(--gray-200);font-size:13px" oninput="filterHospitals(this.value)">
      <div class="filter-pills" style="margin:0">
        <button class="pill on" onclick="setFilter('all',this)">전체 12</button>
        <button class="pill" onclick="setFilter('active',this)">운영 중 9</button>
        <button class="pill" onclick="setFilter('onboarding',this)">온보딩 3</button>
        <button class="pill" onclick="setFilter('paused',this)">일시정지 0</button>
      </div>
      <button class="btn btn-primary" onclick="location.href='hospital_new.html'">+ 병원 등록</button>
    </div>
  </div>
  <div class="content">
    <!-- 임시저장 배너 -->
    <div id="draft-banner" style="display:none;background:var(--amber-l);border:1px solid #FCD34D;border-radius:var(--rl);margin-bottom:16px;overflow:hidden">
      <!-- 배너 헤더 -->
      <div style="padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:18px">📂</span>
          <div style="font-size:13px;font-weight:600;color:#92400E" id="draft-banner-title">임시저장된 병원 등록이 있습니다</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button onclick="deleteAllDrafts()" style="font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid #FCA5A5;background:#FEE2E2;color:var(--red);cursor:pointer;font-family:inherit">전체 삭제</button>
          <button onclick="toggleDraftBanner()" id="draft-toggle-btn" style="font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid #FCD34D;background:#fff;color:#92400E;cursor:pointer;font-family:inherit">접기 ▲</button>
        </div>
      </div>
      <!-- 임시저장 목록 테이블 -->
      <div id="draft-list-wrap" style="border-top:1px solid #FCD34D;overflow:hidden">
        <table style="width:100%;border-collapse:collapse" id="draft-table">
          <thead>
            <tr style="background:rgba(217,119,6,.08)">
              <th style="font-size:10px;font-weight:600;color:#92400E;text-align:left;padding:7px 18px;letter-spacing:.04em">병원명</th>
              <th style="font-size:10px;font-weight:600;color:#92400E;text-align:left;padding:7px 12px;letter-spacing:.04em">진행 단계</th>
              <th style="font-size:10px;font-weight:600;color:#92400E;text-align:left;padding:7px 12px;letter-spacing:.04em">저장 시각</th>
              <th style="font-size:10px;font-weight:600;color:#92400E;text-align:left;padding:7px 12px;letter-spacing:.04em">플랜</th>
              <th style="padding:7px 18px 7px 0;text-align:right"></th>
            </tr>
          </thead>
          <tbody id="draft-tbody"></tbody>
        </table>
      </div>
    </div>
    <!-- 요약 KPI -->
    <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px" id="summary-kpi"></div>
    <!-- 병원 테이블 -->
    <div class="card" style="padding:0;overflow:hidden">
      <table class="table" id="hospital-table">
        <thead>
          <tr>
            <th>병원명</th>
            <th>플랜</th>
            <th>상태</th>
            <th>사이트</th>
            <th>이번 달 문의</th>
            <th>계약 만료</th>
            <th>담당자</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="hospital-tbody"></tbody>
      </table>
    </div>
  </div>
</main>


<script>
// 신규 등록된 병원을 sessionStorage에서 읽어 hospital_list.js의 HOSPITALS에 병합
window.__mergeNewHospitals = function() {
  try {
    const added = JSON.parse(sessionStorage.getItem('MEDIFLOW_new_hospitals') || '[]');
    if (added.length && typeof HOSPITALS !== 'undefined') {
      added.forEach(h => {
        if (!HOSPITALS.find(x => x.id === h.id)) HOSPITALS.push(h);
      });
    }
  } catch(e) {}
};
</script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/hospital_list.js"></script>

<script>
const STEP_LABELS = {1:'기본 정보', 2:'플랜 선택', 3:'담당자 설정', 4:'최종 확인'};
const PLAN_CLS    = {Pro:'badge-blue', Enterprise:'badge-purple', Basic:'badge-gray'};

function renderDraftBanner() {
  const drafts = JSON.parse(sessionStorage.getItem('MEDIFLOW_drafts') || '[]');
  const banner  = document.getElementById('draft-banner');
  if (!banner) return;

  if (!drafts.length) { banner.style.display = 'none'; return; }

  banner.style.display = 'block';

  // 헤더 카운트
  document.getElementById('draft-banner-title').textContent =
    '임시저장된 병원 등록이 ' + drafts.length + '건 있습니다';

  // 테이블 rows
  const tbody = document.getElementById('draft-tbody');
  tbody.innerHTML = drafts.map((d, i) => `
    <tr style="border-top:1px solid #FDE68A;background:${i%2===0?'transparent':'rgba(217,119,6,.04)'}">
      <td style="padding:10px 18px;font-size:13px;font-weight:600;color:#92400E">
        🏥 ${d.nameKr || '(병원명 없음)'}
        ${d.nameJa ? '<span style="font-size:12px;color:#B45309;font-weight:400;margin-left:6px">' + d.nameJa + '</span>' : ''}
      </td>
      <td style="padding:10px 12px;font-size:12px;color:#92400E">
        <span style="background:rgba(217,119,6,.15);padding:2px 8px;border-radius:6px;font-weight:500">
          STEP ${d._step||1}/4 · ${STEP_LABELS[d._step||1]}
        </span>
      </td>
      <td style="padding:10px 12px;font-size:12px;color:#B45309">${d._savedAt || '—'}</td>
      <td style="padding:10px 12px">
        <span class="badge ${PLAN_CLS[d.plan]||'badge-gray'}" style="font-size:10px">${d.plan||'—'}</span>
      </td>
      <td style="padding:10px 18px 10px 0;text-align:right;white-space:nowrap">
        <a class="btn" href="hospital_new.html?draft=${d._draftId}"
           style="font-size:12px;padding:4px 10px;background:#fff;border-color:#FCD34D;color:#92400E;margin-right:4px">
          ✏️ 이어서 작성
        </a>
        <button onclick="deleteDraft(${d._draftId})"
          style="font-size:12px;padding:4px 8px;border-radius:6px;border:1px solid #FCA5A5;background:#FEE2E2;color:var(--red);cursor:pointer;font-family:inherit">
          삭제
        </button>
      </td>
    </tr>`).join('');
}

function showToast(msg,type){var e=document.getElementById('__toast');if(e)e.remove();var bg=type==='success'?'#059669':type==='error'?'#DC2626':'#0F1E3C';var t=document.createElement('div');t.id='__toast';t.style.cssText='position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:'+bg+';color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:9999;white-space:nowrap';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},2500);}
function openModal(title,body,onConfirm,confirmLabel,confirmCls){var e=document.getElementById('__modal');if(e)e.remove();var m=document.createElement('div');m.id='__modal';m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;display:flex;align-items:center;justify-content:center';m.innerHTML='<div style="background:#fff;border-radius:16px;padding:28px 32px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2)"><div style="font-size:15px;font-weight:700;color:#0F1E3C;margin-bottom:10px">'+title+'</div><div style="font-size:13px;color:#374151;line-height:1.7;margin-bottom:20px">'+body+'</div><div style="display:flex;gap:8px;justify-content:flex-end"><button onclick="document.getElementById(\'__modal\').remove()" style="padding:8px 16px;border-radius:8px;border:1px solid #E5E7EB;background:#fff;font-size:13px;font-family:inherit;cursor:pointer">취소</button><button id="__modal-ok" style="padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-family:inherit;cursor:pointer;font-weight:500;'+(confirmCls==='btn-danger'?'background:#DC2626;color:#fff':'background:#0F1E3C;color:#fff')+'">'+(confirmLabel||'확인')+'</button></div></div>';m.addEventListener('click',function(e){if(e.target===m)m.remove();});document.body.appendChild(m);document.getElementById('__modal-ok').addEventListener('click',function(){m.remove();if(typeof onConfirm==='function')onConfirm();});}

function deleteDraft(id) {
  openModal('🗑 임시저장 삭제', '이 임시저장 항목을 삭제하시겠습니까?', function() {
    let drafts = JSON.parse(sessionStorage.getItem('MEDIFLOW_drafts') || '[]');
    drafts = drafts.filter(d => d._draftId !== id);
    sessionStorage.setItem('MEDIFLOW_drafts', JSON.stringify(drafts));
    renderDraftBanner();
    showToast('✓ 삭제되었습니다.', '');
  }, '삭제', 'btn-danger');
}

function deleteAllDrafts() {
  openModal('🗑 전체 삭제', '임시저장된 항목을 모두 삭제하시겠습니까?', function() {
    sessionStorage.removeItem('MEDIFLOW_drafts');
    renderDraftBanner();
    showToast('✓ 전체 삭제되었습니다.', '');
  }, '전체 삭제', 'btn-danger');
}

let _bannerOpen = true;
function toggleDraftBanner() {
  _bannerOpen = !_bannerOpen;
  const wrap = document.getElementById('draft-list-wrap');
  const btn  = document.getElementById('draft-toggle-btn');
  wrap.style.display = _bannerOpen ? 'block' : 'none';
  btn.textContent = _bannerOpen ? '접기 ▲' : '펼치기 ▼';
}

renderDraftBanner();
</script>

</body>
</html>

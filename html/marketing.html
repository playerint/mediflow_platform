<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>마케팅 관리 — MEDIFLOW Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/marketing.css">
</head>
<body>
<div id="sidebar-mount" data-active="marketing"></div>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <a class="topbar-back" href="../index.html">← 대시보드</a>
      <span class="topbar-sep">/</span>
      <span class="topbar-title">마케팅 관리</span>
    </div>
    <div class="topbar-right">
      <select style="font-size:12px;padding:6px 10px;border-radius:var(--r);border:1px solid var(--gray-200);background:#fff">
        <option>2026년 5월</option><option>2026년 4월</option>
      </select>
      <button class="btn" onclick="printMarketingReport()">📄 PDF</button>
    </div>
  </div>
  <div class="content">
    <div class="kpi-grid" id="mkt-kpi"></div>
    <div class="grid2">
      <div class="card">
        <div class="card-head"><div class="card-title">🧠 AEO 인용 현황 (병원별)</div></div>
        <div id="aeo-list"></div>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title">⚡ 리타게팅 성과</div></div>
        <div id="retarget-list"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title">📈 병원별 방문자·전환 비교</div></div>
      <div style="position:relative;width:100%;height:200px">
        <canvas id="convChart" role="img" aria-label="병원별 방문자 전환 비교">병원별 전환 비교.</canvas>
      </div>
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/marketing_list.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CS 관리 — ippeo Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/cs_mgmt.css">
</head>
<body>
<div id="sidebar-mount" data-active="cs"></div>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <a class="topbar-back" href="../index.html">← 대시보드</a>
      <span class="topbar-sep">/</span>
      <span class="topbar-title">CS 관리</span>
    </div>
    <div class="topbar-right">
      <button class="btn btn-primary" onclick="openCsModal()">+ CS 등록</button>
    </div>
  </div>
  <div class="content">
    <div style="display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px" id="cs-kpi"></div>
    <div style="display:grid;grid-template-columns:320px 1fr;gap:14px;height:calc(100vh - 220px)">
      <div style="background:#fff;border:1px solid var(--gray-200);border-radius:var(--rl);display:flex;flex-direction:column;overflow:hidden">
        <div style="padding:12px 16px;border-bottom:1px solid var(--gray-100);background:var(--gray-50)">
          <input type="search" placeholder="병원명·문의 내용 검색..." style="width:100%;padding:6px 12px;border-radius:var(--r);border:1px solid var(--gray-200);font-size:12px">
          <div class="filter-pills" style="margin-top:8px">
            <button class="pill on" onclick="setCsFilter('all',this)">전체</button>
            <button class="pill" onclick="setCsFilter('urgent',this)">긴급</button>
            <button class="pill" onclick="setCsFilter('open',this)">진행중</button>
            <button class="pill" onclick="setCsFilter('closed',this)">완료</button>
          </div>
        </div>
        <div style="flex:1;overflow-y:auto" id="cs-list"></div>
      </div>
      <div style="background:#fff;border:1px solid var(--gray-200);border-radius:var(--rl);display:flex;flex-direction:column;overflow:hidden" id="cs-detail">
        <div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--gray-400);font-size:13px">← CS 항목을 선택하세요</div>
      </div>
    </div>
  </div>

<!-- ── CS 등록 모달 ── -->
<div id="cs-modal-backdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;width:100%;max-width:540px;margin:20px;box-shadow:0 20px 60px rgba(0,0,0,.2);display:flex;flex-direction:column;max-height:90vh;overflow:hidden">

    <!-- 모달 헤더 -->
    <div style="padding:18px 24px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(90deg,rgba(13,148,136,.05),transparent)">
      <div>
        <div style="font-size:15px;font-weight:700;color:var(--navy)">🎧 CS 등록</div>
        <div style="font-size:12px;color:var(--gray-400);margin-top:2px">새 CS 티켓을 등록합니다</div>
      </div>
      <button onclick="closeCsModal()" style="width:30px;height:30px;border-radius:50%;border:1px solid var(--gray-200);background:#fff;cursor:pointer;font-size:16px;color:var(--gray-400);display:flex;align-items:center;justify-content:center;line-height:1">✕</button>
    </div>

    <!-- 모달 바디 -->
    <div style="padding:20px 24px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px">

      <!-- 병원 선택 -->
      <div>
        <div style="font-size:12px;font-weight:600;color:var(--gray-700);margin-bottom:5px">병원 선택 <span style="color:var(--red)">*</span></div>
        <select id="cs-modal-hospital" style="width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;color:var(--gray-700)">
          <option value="">병원을 선택하세요</option>
          <option>올래성형외과</option>
          <option>강남뷰티클리닉</option>
          <option>청담미래성형외과</option>
          <option>압구정원성형외과</option>
          <option>신사라인성형외과</option>
          <option>도곡세라성형외과</option>
          <option>반포미성형외과</option>
          <option>논현더플러스</option>
          <option>역삼유나이티드</option>
          <option>이수프리마</option>
          <option>사당뷰성형외과</option>
          <option>방배탑성형외과</option>
        </select>
      </div>

      <!-- 제목 -->
      <div>
        <div style="font-size:12px;font-weight:600;color:var(--gray-700);margin-bottom:5px">제목 <span style="color:var(--red)">*</span></div>
        <input type="text" id="cs-modal-title" placeholder="CS 제목을 입력하세요" style="width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;color:var(--gray-700)">
      </div>

      <!-- 유형 + 긴급 여부 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div>
          <div style="font-size:12px;font-weight:600;color:var(--gray-700);margin-bottom:5px">CS 유형 <span style="color:var(--red)">*</span></div>
          <select id="cs-modal-type" style="width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;color:var(--gray-700)">
            <option value="normal">일반</option>
            <option value="urgent">긴급</option>
          </select>
        </div>
        <div>
          <div style="font-size:12px;font-weight:600;color:var(--gray-700);margin-bottom:5px">카테고리</div>
          <select id="cs-modal-category" style="width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;color:var(--gray-700)">
            <option>사이트 오류</option>
            <option>LINE 연동 오류</option>
            <option>콘텐츠 수정 요청</option>
            <option>플랜 변경 요청</option>
            <option>계약 관련</option>
            <option>기타</option>
          </select>
        </div>
      </div>

      <!-- 내용 -->
      <div>
        <div style="font-size:12px;font-weight:600;color:var(--gray-700);margin-bottom:5px">내용 <span style="color:var(--red)">*</span></div>
        <textarea id="cs-modal-body" rows="4" placeholder="CS 내용을 상세히 입력하세요..." style="width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;resize:vertical;line-height:1.6;color:var(--gray-700)"></textarea>
      </div>

      <!-- 담당자 -->
      <div>
        <div style="font-size:12px;font-weight:600;color:var(--gray-700);margin-bottom:5px">담당자 배정</div>
        <select id="cs-modal-manager" style="width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:var(--r);font-size:13px;font-family:inherit;outline:none;color:var(--gray-700)">
          <option>김운영 (슈퍼 어드민)</option>
          <option>이수진 (운영팀)</option>
        </select>
      </div>

      <!-- 긴급 안내 배너 (긴급 선택 시 표시) -->
      <div id="cs-urgent-banner" style="display:none;background:var(--red-l);border:1px solid #FCA5A5;border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--red);display:none;align-items:center;gap:8px">
        <span style="font-size:16px">🚨</span>
        <span>긴급 티켓은 등록 즉시 담당자에게 알림이 발송됩니다.</span>
      </div>

    </div>

    <!-- 모달 푸터 -->
    <div style="padding:14px 24px;border-top:1px solid var(--gray-100);background:var(--gray-50);display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:12px;color:var(--gray-400)">* 표시는 필수 입력 항목입니다</span>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="closeCsModal()">취소</button>
        <button class="btn btn-primary" onclick="submitCsModal()">등록하기</button>
      </div>
    </div>

  </div>
</div>

</main>


<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/cs_mgmt.js"></script>
<script>
function showToast(msg,type){var e=document.getElementById('__toast');if(e)e.remove();var bg=type==='success'?'#059669':type==='error'?'#DC2626':'#0F1E3C';var t=document.createElement('div');t.id='__toast';t.style.cssText='position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:'+bg+';color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:9999;white-space:nowrap';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},2500);}
</script>

<script>
function openCsModal() {
  const backdrop = document.getElementById('cs-modal-backdrop');
  backdrop.style.display = 'flex';
  // 입력 초기화
  ['cs-modal-hospital','cs-modal-title','cs-modal-body'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('cs-modal-type').value = 'normal';
  document.getElementById('cs-urgent-banner').style.display = 'none';
  // 입력 포커스
  setTimeout(() => document.getElementById('cs-modal-hospital').focus(), 100);
  // 긴급 선택 감지
  document.getElementById('cs-modal-type').onchange = function() {
    const banner = document.getElementById('cs-urgent-banner');
    banner.style.display = this.value === 'urgent' ? 'flex' : 'none';
  };
  // ESC 닫기
  document.onkeydown = function(e) { if(e.key === 'Escape') closeCsModal(); };
}

function closeCsModal() {
  document.getElementById('cs-modal-backdrop').style.display = 'none';
  document.onkeydown = null;
}

// 백드롭 클릭 시 닫기
document.getElementById('cs-modal-backdrop').addEventListener('click', function(e) {
  if (e.target === this) closeCsModal();
});

function submitCsModal() {
  const hospital = document.getElementById('cs-modal-hospital').value;
  const title    = document.getElementById('cs-modal-title').value.trim();
  const body     = document.getElementById('cs-modal-body').value.trim();
  const type     = document.getElementById('cs-modal-type').value;

  if (!hospital) { showToast('병원을 선택하세요.', 'error'); document.getElementById('cs-modal-hospital').focus(); return; }
  if (!title)    { showToast('제목을 입력하세요.', 'error'); document.getElementById('cs-modal-title').focus(); return; }
  if (!body)     { showToast('내용을 입력하세요.', 'error'); document.getElementById('cs-modal-body').focus(); return; }

  // CS_ITEMS에 추가
  const newItem = {
    id: CS_ITEMS.length + 1,
    hospital,
    type,
    title,
    body,
    time: '방금',
    status: 'open'
  };
  CS_ITEMS.unshift(newItem);
  closeCsModal();
  renderList(currentFilter);

  // KPI 업데이트
  const kpiEl = document.getElementById('cs-kpi');
  if (kpiEl) {
    const total  = CS_ITEMS.length;
    const open   = CS_ITEMS.filter(c => c.status === 'open').length;
    const urgent = CS_ITEMS.filter(c => c.type === 'urgent').length;
    kpiEl.children[0].querySelector('div:last-child').textContent = total + '건';
    kpiEl.children[1].querySelector('div:last-child').textContent = open + '건';
    kpiEl.children[2].querySelector('div:last-child').textContent = urgent + '건';
  }
}
</script>

</body>
</html>

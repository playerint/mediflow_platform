<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>결제 관리 — MEDIFLOW Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/billing.css">
</head>
<body>
<div id="sidebar-mount" data-active="billing"></div>

<main class="main">
  <div class="topbar">
    <div class="topbar-left">
      <a class="topbar-back" href="../index.html">← 대시보드</a>
      <span class="topbar-sep">/</span>
      <span class="topbar-title">결제 관리</span>
    </div>
    <div class="topbar-right">
      <select style="font-size:12px;padding:6px 10px;border-radius:var(--r);border:1px solid var(--gray-200);background:#fff">
        <option>2026년 5월</option><option>2026년 4월</option><option>2026년 3월</option>
      </select>
      <button class="btn" onclick="exportBillingCsv()">📥 정산 리포트</button>
    </div>
  </div>
  <div class="content">
    <div class="kpi-grid" id="billing-kpi"></div>
    <div class="grid2">
      <div class="card">
        <div class="card-head"><div class="card-title">💳 이번 달 청구 내역</div></div>
        <table class="table">
          <thead><tr><th>병원명</th><th>플랜</th><th>금액</th><th>청구일</th><th>납부 상태</th><th></th></tr></thead>
          <tbody id="billing-tbody"></tbody>
        </table>
      </div>
      <div>
        <div class="card" style="margin-bottom:14px">
          <div class="card-head"><div class="card-title">📈 월별 매출 추이</div></div>
          <div style="position:relative;width:100%;height:160px">
            <canvas id="revenueChart" role="img" aria-label="월별 매출 추이">월별 매출 추이.</canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-head"><div class="card-title">⚠ 미납 병원</div></div>
          <div id="unpaid-list"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/billing_list.js"></script>
</body>
</html>
